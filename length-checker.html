<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>判断文案的长度</title>
</head>
<body>
<pre id="output">[{"error":"missing text"}]</pre>
<script>
  (function () {
    var params = new URLSearchParams(location.search);
    var text = params.get('text');
    var output = document.getElementById('output');
    var minLen = 50;
    var maxLen = 55;
    var ignoredChars = new Set(['{', '}', '#']);

    function analyzeText(value) {
      var length = 0;

      for (var i = 0; i < value.length; i += 1) {
        if (!ignoredChars.has(value[i])) {
          length += 1;
        }
      }

      return {
        text: value,
        length: length,
        valid: length >= minLen && length <= maxLen,
        gap: {
          to_min: length - minLen,
          to_max: maxLen - length
        }
      };
    }

    if (text === null) {
      output.textContent = JSON.stringify([{ error: 'missing text' }]);
      return;
    }

    var parts = text.split('#');
    var results = [];

    for (var index = 0; index < parts.length; index += 1) {
      var item = parts[index].trim();

      if (!item) {
        continue;
      }

      results.push(analyzeText(item));
    }

    output.textContent = JSON.stringify(results);
  })();
</script>
</body>
</html>
